spring:
    application:
        name: story-keeper-backend

    # Database Configuration (dev)
    # Set DATABASE_URL (e.g. Neon from Vercel): postgresql://user:pass@host:port/db?sslmode=require
    # Or use spring.datasource.url / DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD

    jpa:
        open-in-view: false # Disable Open Session In View pattern
        hibernate:
            ddl-auto: none # Disable automatic schema creation for local development
        show-sql: false # Disable SQL query logging
        properties:
            hibernate:
                format_sql: false # Disable SQL formatting
                jdbc:
                    lob:
                        non_contextual_creation: true

# JWT Configuration
JWT_SECRET: "test-secret-key-for-jwt-service-testing-must-be-at-least-32-characters-long-for-hmac-sha256"

# Logging Configuration
logging:
    level:
        root: WARN
        com.app: INFO
        org.hibernate: WARN # Disable Hibernate logs
        org.springframework.web.servlet.handler.HandlerMappingIntrospector: ERROR # Suppress cache miss warnings (harmless, occurs on first request)
